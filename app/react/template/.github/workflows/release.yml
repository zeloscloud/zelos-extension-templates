name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

{% raw %}
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
{% endraw %}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify version matches manifest files
        run: |
          TAG_VERSION="{% raw %}${{ steps.version.outputs.VERSION }}{% endraw %}"

          EXTENSION_VERSION=$(node -e "const t=require('fs').readFileSync('extension.toml','utf8');const m=t.match(/^version\s*=\s*\"([^\"]+)\"/m);console.log(m[1])")
          if [ "$EXTENSION_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: extension.toml version ($EXTENSION_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ extension.toml version matches: $EXTENSION_VERSION"

          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "✓ package.json version matches: $PKG_VERSION"

      - name: Install Zelos CLI
        run: |
          curl -fsSL https://release.zeloscloud.io/cli/install.sh | bash
          echo "$HOME/.zelos/bin" >> $GITHUB_PATH
        env:
          INSTALLER_NO_MODIFY_PATH: 1

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build and package extension
        run: |
          npm run build
          npm run package

      - name: Verify package was created
        run: |
          PACKAGE_FILE="*-{% raw %}${{ steps.version.outputs.VERSION }}{% endraw %}.tar.gz"
          if ! ls $PACKAGE_FILE 1> /dev/null 2>&1; then
            echo "Error: Package file not found: $PACKAGE_FILE"
            exit 1
          fi
          echo "✓ Package created: $(ls $PACKAGE_FILE)"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.4.1
        with:
          files: "*-{% raw %}${{ steps.version.outputs.VERSION }}{% endraw %}.tar.gz"
          generate_release_notes: true
          fail_on_unmatched_files: true
